<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Home Base</title>
<link rel="stylesheet" href="/css/main.css" />
</head>
<body class="dash-page" id="dashBody">

  <div class="ticker-bar">
    <div class="ticker-label">
      <svg class="bot" id="tickerBot" viewBox="0 0 40 40" width="26" height="26" aria-hidden="true">
        <line x1="20" y1="4" x2="20" y2="10" stroke="#c98a3e" stroke-width="2" stroke-linecap="round" />
        <circle class="bot-antenna-tip" cx="20" cy="4" r="2.5" fill="#c98a3e" />
        <rect x="6" y="10" width="28" height="22" rx="10" fill="#2b6f6a" stroke="rgba(245,242,234,0.3)" stroke-width="1" />
        <circle class="bot-eye" cx="16" cy="21" r="2.6" fill="#f5f2ea" />
        <circle class="bot-eye" cx="24" cy="21" r="2.6" fill="#f5f2ea" />
      </svg>
      ASSISTANT
    </div>
    <div class="ticker-track" id="tickerTrack"><span class="ticker-item">Loading today's updates…</span></div>
    <div class="ticker-actions">
      <button class="icon-btn" id="adminLink" style="display:none;" onclick="window.location.href='/admin'">Admin</button>
      <button class="icon-btn" id="settingsBtn">Customize</button>
      <button class="icon-btn" id="logoutBtn">Sign out</button>
    </div>
  </div>

  <main class="dash-main">
    <div class="dash-header">
      <div>
        <div class="dash-greeting" id="greeting">Hello</div>
        <div class="dash-greeting-rule"></div>
      </div>
    </div>

    <div class="widget-grid">
      <section class="widget-card accent-brass" aria-label="Clock">
        <h2 class="widget-title">
          <svg class="wicon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#c98a3e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Clock
        </h2>
        <div class="clock-time" id="clockTime">--:--:--</div>
        <div class="clock-date" id="clockDate">—</div>
      </section>

      <section class="widget-card accent-teal" aria-label="Timer">
        <h2 class="widget-title">
          <svg class="wicon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2b6f6a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="9" y1="2" x2="15" y2="2"/><line x1="12" y1="2" x2="12" y2="4"/></svg>
          Timer
        </h2>
        <div class="timer-display" id="timerDisplay">00:00</div>
        <div class="timer-controls">
          <button class="primary" id="timerStartPause">Start</button>
          <button id="timerReset">Reset</button>
        </div>
        <div class="timer-presets">
          <button data-secs="300">5 min</button>
          <button data-secs="600">10 min</button>
          <button data-secs="900">15 min</button>
          <button data-secs="1500">25 min</button>
        </div>
        <div class="timer-custom">
          <input type="number" id="timerMinInput" min="0" max="999" placeholder="min" aria-label="Minutes" />
          <input type="number" id="timerSecInput" min="0" max="59" placeholder="sec" aria-label="Seconds" />
          <button id="timerSetCustom" type="button">Set</button>
        </div>
      </section>

      <section class="widget-card accent-success" aria-label="To-do list" style="grid-column: span 1;">
        <h2 class="widget-title">
          <svg class="wicon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#4c9a6a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          To-do
        </h2>
        <form class="todo-form" id="todoForm">
          <input type="text" id="todoInput" placeholder="Add a task…" maxlength="200" required />
          <button type="submit">Add</button>
        </form>
        <ul class="todo-list" id="todoList"></ul>
      </section>

      <section class="widget-card accent-lavender" aria-label="Notepad">
        <h2 class="widget-title">
          <svg class="wicon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8c86c9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          Notepad
        </h2>
        <textarea class="notepad-area" id="notepadArea" placeholder="Jot something down…"></textarea>
        <div class="notepad-status" id="notepadStatus"></div>
      </section>
    </div>
  </main>

  <!-- Settings modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal-card">
      <h2 class="modal-title">Customize your space</h2>

      <div class="field">
        <label>Background color / gradient</label>
        <div class="swatch-row" id="bgSwatches"></div>
      </div>

      <div class="field">
        <label for="bgUpload">Or upload your own image</label>
        <input type="file" id="bgUpload" accept="image/png, image/jpeg, image/webp, image/gif" />
      </div>

      <div class="field">
        <label>Accent color</label>
        <div class="swatch-row" id="accentSwatches"></div>
      </div>

      <div class="field">
        <label for="clockFormat">Clock format</label>
        <select id="clockFormat" style="width:100%;">
          <option value="12h">12-hour</option>
          <option value="24h">24-hour</option>
        </select>
      </div>

      <div class="modal-footer">
        <button class="btn-secondary" id="closeSettings">Cancel</button>
        <button class="btn-primary" id="saveSettings" style="width:auto;">Save</button>
      </div>
    </div>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
